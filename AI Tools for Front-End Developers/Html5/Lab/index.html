<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Shapes Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 30px;
     
    }
    svg {
      border: 2px solid #333;
      background-color: #f9f9f9;
    }

    video {
      width: 500px;
      border: 3px solid #333;
      border-radius: 10px;
    }
    audio {
      margin-top: 20px;
      width: 400px;
      border: 2px solid ;
    }

  </style>
</head>
<body>

  <h2>Shapes Using SVG Tag</h2>
  <svg width="500" height="300">
    <rect x="20" y="20" width="120" height="80" fill="#4caf50" stroke="black" stroke-width="2" />
    <circle cx="250" cy="60" r="40" fill="#ff5722" stroke="black" stroke-width="2" />
    <polygon points="150,250 250,170 350,250" fill="#ffeb3b" stroke="#000" stroke-width="2" />
  </svg>

  <hr>
   <h2>Audio and Video Tags </h2>

  <video src="https://www.w3schools.com/html/mov_bbb.mp4"  
         muted 
         loop 
         autoplay 
         controls>
  </video>

  <audio src="https://www.orangefreesounds.com/wp-content/uploads/2015/06/Sound-of-a-peacock.mp3"
         muted 
         loop 
         autoplay 
         controls> 
  </audio>

  <hr>
    <h2>Canvas Example - Two Shapes</h2>
  <canvas id="myCanvas" width="300" height="200" style="border:1px solid #000000;">
    Your browser does not support the HTML canvas tag.
  </canvas>

  <script>
    var c = document.getElementById("myCanvas");
    var ctx = c.getContext("2d");
    ctx.fillStyle = "skyblue";
    ctx.fillRect(20, 20, 100, 60);

    ctx.beginPath();
    ctx.arc(200, 80, 40, 0, 2 * Math.PI);
    ctx.fillStyle = "pink";
    ctx.fill();
    ctx.stroke();
  </script>
</body>
</html>
