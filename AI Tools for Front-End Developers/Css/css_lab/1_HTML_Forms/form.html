<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  
  <link rel="stylesheet" href="form.css">
</head>
<body>

  

  <div id="container">
    <h2>Contact Us</h2>
  <form id="contact-form">
    <div class="form-group">
      <input type="text" id="name" class="form-field" placeholder="Enter your name" required>
    </div>

    <div class="form-group">
      <input type="email" id="email" class="form-field" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
      <textarea id="message" class="form-field" rows="4" placeholder="Write your message"></textarea>
    </div>

    <input type="submit" id="submit-btn" value="Send Message">
  </form>
  </div>
</body>
</html>
